<!-- Modal Alta Proyecto -->
<div class="modal fade" id="mdlGestionarConfiguracionCloud" tabindex="-1" aria-labelledby="exampleModalLabel"
    aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="exampleModalLabel">Configurar CLOUD</h5>
            </div>
            <div class="modal-body">

                <form method="post" id="formGestionarConfiguracionCloud">
                    <input type="hidden" id="cloud_proyecto_id" name="proyecto_id">
                    <input type="hidden" name="auth_method" id="auth_method">

                    <!-- 🔐 SWITCH -->
                    <div class="mb-3 form-check form-switch">
                        <input class="form-check-input" type="checkbox" id="authSwitch">
                        <label class="form-check-label fw-bold" for="authSwitch">
                            Usar IAM Role (Recomendado)
                        </label>
                    </div>

                    <!-- 🔑 SECCIÓN ACCESS KEYS -->
                    <div id="keysSection">
                        <div class="mb-3">
                            <label for="access_key" class="form-label fw-bold">Access Key</label>
                            <input name="access_key" id="access_key" type="text" class="form-control form-control-sm">
                        </div>
                        <div class="mb-3">
                            <label for="secret_key" class="form-label fw-bold">Secret Key</label>
                            <input name="secret_key" id="secret_key" type="password" class="form-control form-control-sm">
                        </div>
                    </div>

                    <!-- 🟢 SECCIÓN IAM ROLE -->
                    <div id="roleSection" style="display:none;">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Role ARN</label>
                            <input name="arn_role" id="arn_role" type="text" class="form-control form-control-sm">
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">External ID</label>
                            <input name="external_id" id="external_id" type="text" class="form-control form-control-sm">
                        </div>

                        <!-- 🔑 Keys del pentester para hacer AssumeRole -->
                        <hr class="my-2">
                        <p class="text-muted small mb-2">Credenciales de tu cuenta AWS (pentester)</p>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Access Key</label>
                            <input name="access_key" id="role_access_key" type="text" class="form-control form-control-sm">
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Secret Key</label>
                            <input name="secret_key" id="role_secret_key" type="password" class="form-control form-control-sm">
                        </div>
                    </div>

                    <!-- 🌍 REGION -->
                    <div class="mb-3">
                        <label for="region" class="form-label fw-bold">Region</label>
                        <input name="region" id="region" type="text" class="form-control form-control-sm" required>
                    </div>

                    <div class="d-flex justify-content-end">
                        <button type="button" class="btn btn-sm btn-secondary mx-1 py-0 px-2"
                            data-bs-dismiss="modal">Cerrar</button>
                        <button type="submit" class="btn btn-sm btn-primary mx-1 py-0 px-2">Guardar</button>
                    </div>

                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                </form>

            </div>
        </div>
    </div>
</div>
