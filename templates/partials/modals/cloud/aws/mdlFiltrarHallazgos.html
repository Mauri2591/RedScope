<!-- Modal Filtrar Hallazgos -->
<div class="modal fade" id="mdlFiltrarHallazgos" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-xl">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Filtrar Hallazgos</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">

                <div class="row mb-3">
                    <div class="input-group input-group-sm">
                        <input type="text" id="inputMitreTecnica" class="form-control"
                            placeholder="Ej: T1046 o Network Service...">
                        <button class="btn btn-primary" onclick="buscarPorMitre()">
                            <i class="bi bi-search"></i> Buscar
                        </button>
                    </div>
                </div>

                <div id="contenedorResultadosMitre" style="display:none;">
                    <table class="table table-sm table-hover table-striped">
                        <thead class="table-dark">
                            <tr>
                                <th>Resource ID</th>
                                <th>Check ID</th>
                                <th>Servicio</th>
                                <th>Severidad</th>
                                <th>Gestionar</th>
                            </tr>
                        </thead>
                        <tbody id="tbodyMitreFindings"></tbody>
                    </table>
                </div>

                <div id="sinResultadosMitre" class="text-center text-muted small" style="display:none;">
                    No se encontraron hallazgos para esta técnica.
                </div>

            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-sm btn-secondary" data-bs-dismiss="modal">Cerrar</button>
            </div>
        </div>
    </div>
</div>
