<!-- Modal Alta Proyecto -->
<div class="modal fade" id="mdlAltaServicio" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="exampleModalLabel">Alta Servicio</h5>
            </div>
            <div class="modal-body">

                <form method="post" id="formAltaServicio">
                    <div class="mb-3">
                        <label for="titulo" class="form-label">Nombre</label>
                        <input value="" type="text" class="form-control form-control-sm" name="nombre" id="nombre">
                    </div>

                    <div class="mb-3">
                        <label for="cliente" class="form-label">Descripcion</label>
                        <textarea value="" type="text" rows="5" class="form-control form-control-sm" name="descripcion" id="descripcion" placeholder="Ingrese una breve descripcion del servicio"></textarea>
                    </div>

                    <div class="d-flex justify-content-end">
                        <button type="button" class="btn btn-sm btn-secondary mx-1 py-0 px-2"
                            data-bs-dismiss="modal">Cerrar</button>
                        <button type="submit" id="btnAltaServicio"
                            class="btn btn-sm btn-primary mx-1 py-0 px-2">Guardar</button>
                    </div>
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                </form>
            </div>
        </div>
    </div>
</div>
